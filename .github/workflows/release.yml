name: Build Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '发布标签（留空则使用当前 push 的 tag）'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Rename APK with version
        id: rename
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | cut -d'"' -f2 | tr -d '\r')
          echo "Detected version: $VERSION"
          cp app/build/outputs/apk/release/app-release.apk "moku-v${VERSION}.apk"
          echo "APK_NAME=moku-v${VERSION}.apk" >> $GITHUB_OUTPUT

      - name: Create / Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag || 'Manual Build' }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            moku-v*.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
